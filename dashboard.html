<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Professional Dashboard</title>
    <style>
        :root { --primary: #3498db; --bg: #0f0f0f; --card: #1a1a1a; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; }
        .section { background: var(--card); padding: 40px; border-radius: 20px; margin-bottom: 30px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 36px; text-align: center; color: var(--primary); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        h2 { font-size: 28px; border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 25px; }
        
        /* Input Fields */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        input, textarea { background: #262626; border: 1px solid #444; color: white; padding: 15px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        textarea { grid-column: span 2; }
        input:focus { border-color: var(--primary); outline: none; }

        .btn { background: var(--primary); color: white; padding: 18px; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; font-weight: bold; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4); }

        /* PORTFOLIO OUTPUT - LARGE & EFFECTIVE */
        #portfolioBox { 
            background: white; color: #1a1a1a; padding: 60px; border-radius: 15px; 
            margin-top: 50px; display: none; box-shadow: 0 0 50px rgba(255,255,255,0.1);
        }
        .port-header { display: flex; align-items: center; gap: 40px; border-bottom: 4px solid var(--primary); padding-bottom: 30px; margin-bottom: 40px; }
        
        /* Large Photo Size */
        .profile-img { width: 220px; height: 220px; border-radius: 20px; object-fit: cover; border: 6px solid var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        .name-title h1 { font-size: 48px; margin: 0; color: #1a1a1a; text-align: left; }
        .name-title h3 { font-size: 26px; color: var(--primary); margin: 5px 0; }

        /* Large Matter Text */
        .info-item { font-size: 22px; margin: 20px 0; border-bottom: 1px dashed #ddd; padding-bottom: 10px; }
        .info-item strong { color: var(--primary); min-width: 200px; display: inline-block; }
        
        .skill-tag { background: #eef7ff; color: var(--primary); padding: 10px 20px; border-radius: 10px; display: inline-block; margin: 5px; font-weight: bold; font-size: 18px; border: 1px solid #d0e8f8; }
        
        .project-box { background: #f9f9f9; padding: 30px; border-radius: 12px; margin-top: 30px; border-left: 8px solid var(--primary); }
        .project-box p { font-size: 22px; line-height: 1.8; color: #333; }

        @media print {
            body * { visibility: hidden; }
            #portfolioBox, #portfolioBox * { visibility: visible; }
            #portfolioBox { position: absolute; left: 0; top: 0; width: 100%; padding: 40px; }
            .no-print { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Nexus AI: Professional Dashboard</h1>

    <div class="section">
        <h2>💼 Portfolio Content Creator</h2>
        <div class="input-grid">
            <input type="text" id="pName" placeholder="Full Name (e.g., Aleti Pranav Kumar Reddy)">
            <input type="text" id="pRole" placeholder="Professional Role (e.g., Python Developer)">
            <input type="text" id="pSkills" placeholder="Skills (Python, AI, React - use commas)">
            <input type="text" id="pLang" placeholder="Languages (Telugu, English, Hindi)">
            <input type="text" id="pHobbies" placeholder="Hobbies">
            <input type="text" id="pExp" placeholder="Education / Year">
            <textarea id="pProjects" rows="5" placeholder="Detailed Projects Information..."></textarea>
        </div>
        <p style="margin-top:20px; font-weight:bold;">📸 Upload High-Resolution Photo:</p>
        <input type="file" id="pPhoto" accept="image/*" onchange="previewImage(event)" style="border:none; padding-left:0;">
        <button class="btn" onclick="generatePortfolio()">🚀 Generate High-Impact Portfolio</button>
    </div>

    <div id="portfolioBox">
        <div class="port-header">
            <img id="viewPhoto" class="profile-img" src="" style="display:none;">
            <div class="name-title">
                <h1 id="viewName"></h1>
                <h3 id="viewRole"></h3>
            </div>
        </div>

        <div class="info-item"><strong>🎓 Education:</strong> <span id="viewExp"></span></div>
        <div class="info-item"><strong>🗣️ Languages:</strong> <span id="viewLang"></span></div>
        <div class="info-item"><strong>🎨 Hobbies:</strong> <span id="viewHobbies"></span></div>
        
        <div style="margin: 30px 0;">
            <strong style="font-size: 24px;">🛠️ Core Technical Skills:</strong><br>
            <div id="viewSkills" style="margin-top:15px;"></div>
        </div>

        <div class="project-box">
            <strong style="font-size: 24px; color: var(--primary);">🚀 Featured Projects:</strong>
            <p id="viewProjects"></p>
        </div>

        <button class="btn no-print" onclick="window.print()" style="background: #27ae60; margin-top:40px; font-size:22px;">📥 Download Professional PDF</button>
    </div>
</div>

<script>
    let photoData = "";
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = () => photoData = reader.result;
        reader.readAsDataURL(event.target.files[0]);
    }

    function generatePortfolio() {
        document.getElementById('viewName').innerText = document.getElementById('pName').value;
        document.getElementById('viewRole').innerText = document.getElementById('pRole').value;
        document.getElementById('viewExp').innerText = document.getElementById('pExp').value;
        document.getElementById('viewLang').innerText = document.getElementById('pLang').value;
        document.getElementById('viewHobbies').innerText = document.getElementById('pHobbies').value;
        document.getElementById('viewProjects').innerText = document.getElementById('pProjects').value;

        const skills = document.getElementById('pSkills').value.split(',');
        const skillContainer = document.getElementById('viewSkills');
        skillContainer.innerHTML = "";
        skills.forEach(s => {
            if(s.trim() !== "") {
                const span = document.createElement('span');
                span.className = 'skill-tag';
                span.innerText = s.trim();
                skillContainer.appendChild(span);
            }
        });

        if(photoData) {
            const img = document.getElementById('viewPhoto');
            img.src = photoData; img.style.display = 'block';
        }

        document.getElementById('portfolioBox').style.display = 'block';
        window.scrollTo({ top: document.getElementById('portfolioBox').offsetTop, behavior: 'smooth' });
    }
</script>

</body>
</html>
