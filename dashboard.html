<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Pranav Pro-Project</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .section { background: #1e1e1e; padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        h1 { color: #3498db; text-align: center; }
        
        /* Input Grid Styling */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 10px; }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #2d2d2d; color: white; font-size: 14px; }
        textarea { grid-column: span 2; }
        
        .btn { background: #3498db; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #2980b9; }

        /* Portfolio Preview */
        #portfolioBox { 
            background: white; color: black; padding: 40px; border-radius: 10px; 
            margin-top: 30px; display: none; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .profile-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #3498db; margin-bottom: 15px; display: block; }
        .port-header { border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 20px; }
        .skill-tag { background: #e1f0fa; color: #3498db; padding: 5px 12px; border-radius: 20px; display: inline-block; margin: 4px; font-weight: bold; font-size: 13px; }

        @media print {
            body * { visibility: hidden; }
            #portfolioBox, #portfolioBox * { visibility: visible; }
            #portfolioBox { position: absolute; left: 0; top: 0; width: 100%; box-shadow: none; }
            .no-print { display: none; }
        }
        
        /* Mobile adjustment */
        @media (max-width: 600px) { .input-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Pranav's Smart Dashboard</h1>

        <div class="section">
            <h2>📧 Email Priority Predictor</h2>
            <textarea id="emailText" rows="3" placeholder="Paste email content here..."></textarea>
            <button class="btn" onclick="predictPriority()">Check Priority 🔍</button>
            <div id="result" style="font-weight:bold; margin-top:10px; text-align:center;"></div>
        </div>

        <div class="section">
            <h2>💼 Professional Portfolio Builder</h2>
            <div class="input-grid">
                <input type="text" id="pName" placeholder="Full Name (e.g. Aleti Pranav Kumar)">
                <input type="text" id="pRole" placeholder="Role (e.g. B.Tech 2nd Year Student)">
                <input type="text" id="pSkills" placeholder="Skills (e.g. Python, Java, HTML)">
                <input type="text" id="pLang" placeholder="Languages (e.g. Telugu, English)">
                <input type="text" id="pHobbies" placeholder="Hobbies">
                <input type="text" id="pExp" placeholder="College / Experience">
                <textarea id="pProjects" rows="4" placeholder="Projects (Write each project on a new line)"></textarea>
            </div>
            
            <p style="font-size: 13px; color: #aaa;">Upload Photo:</p>
            <input type="file" id="pPhoto" accept="image/*" onchange="previewImage(event)" style="background:none;">
            
            <button class="btn" onclick="generatePortfolio()">Generate Portfolio ✨</button>

            <div id="portfolioBox">
                <div class="port-header">
                    <img id="viewPhoto" class="profile-img" src="" style="display:none;">
                    <h1 id="viewName" style="margin:0; color:#2c3e50;"></h1>
                    <h3 id="viewRole" style="color: #3498db; margin:5px 0;"></h3>
                </div>
                
                <p><strong>🎓 Education/Exp:</strong> <span id="viewExp"></span></p>
                <div style="margin: 15px 0;">
                    <strong>🛠️ Technical Skills:</strong>
                    <div id="viewSkills" style="margin-top: 8px;"></div>
                </div>
                <p><strong>🗣️ Languages:</strong> <span id="viewLang"></span></p>
                <p><strong>🎨 Hobbies:</strong> <span id="viewHobbies"></span></p>
                
                <div style="margin-top:20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <strong style="color:#3498db;">🚀 Key Projects:</strong>
                    <p id="viewProjects" style="white-space: pre-line; margin-top:10px; line-height:1.6;"></p>
                </div>
                
                <button class="btn no-print" onclick="window.print()" style="background: #27ae60; margin-top:20px;">Download PDF 📄</button>
            </div>
        </div>
    </div>

    <script>
        let photoData = "";
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = () => photoData = reader.result;
            reader.readAsDataURL(event.target.files[0]);
        }

        function predictPriority() {
            const text = document.getElementById('emailText').value.toLowerCase();
            const res = document.getElementById('result');
            if(text.includes('urgent') || text.includes('deadline') || text.includes('exam')) {
                res.innerText = "🔴 High Priority"; res.style.color = "#ff4d4d";
            } else if(text.includes('meeting') || text.includes('update')) {
                res.innerText = "🟡 Medium Priority"; res.style.color = "#f1c40f";
            } else {
                res.innerText = "⚪ Low Priority"; res.style.color = "#aaa";
            }
        }

        function generatePortfolio() {
            document.getElementById('viewName').innerText = document.getElementById('pName').value;
            document.getElementById('viewRole').innerText = document.getElementById('pRole').value;
            document.getElementById('viewExp').innerText = document.getElementById('pExp').value;
            document.getElementById('viewLang').innerText = document.getElementById('pLang').value;
            document.getElementById('viewHobbies').innerText = document.getElementById('pHobbies').value;
            document.getElementById('viewProjects').innerText = document.getElementById('pProjects').value;
            
            // Skills logic - tags la chupinchadaniki
            const skills = document.getElementById('pSkills').value.split(',');
            const skillContainer = document.getElementById('viewSkills');
            skillContainer.innerHTML = "";
            skills.forEach(s => {
                if(s.trim() !== "") {
                    const span = document.createElement('span');
                    span.className = 'skill-tag';
                    span.innerText = s.trim();
                    skillContainer.appendChild(span);
                }
            });

            if(photoData) {
                const img = document.getElementById('viewPhoto');
                img.src = photoData; img.style.display = 'block';
            }
            
            document.getElementById('portfolioBox').style.display = 'block';
            window.scrollTo({ top: document.getElementById('portfolioBox').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
