<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pranav Pro-Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="door-container">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <div class="person-silhouette" id="person"></div>
    </div>

    <div class="login-card" id="login-form">
        <h2>Welcome Pranav!</h2>
        <input type="text" id="username" placeholder="Enter your Name">
        
        <div class="captcha-container">
            <span id="captcha-code"></span>
            <button type="button" onclick="generateCaptcha()">Refresh</button>
        </div>
        <input type="text" id="captcha-input" placeholder="Enter Captcha">
        
        <button onclick="handleLogin()">Login to Dashboard</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
