<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Welcome | Pranav Pro-Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="door-container">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <div class="person-silhouette" id="person"></div>
    </div>

    <div class="login-card" id="login-form">
        <h2 class="welcome-text">✨ Welcome Pranav! ⚡</h2>
        <p style="color: #666; margin-bottom: 20px;">Please login to enter your dashboard</p>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="👤 Enter your Name">
        </div>
        
        <div class="captcha-box">
            <span id="captcha-code">LOADING</span>
            <button type="button" class="refresh-btn" onclick="generateCaptcha()">🔄</button>
        </div>
        
        <div class="input-group">
            <input type="text" id="captcha-input" placeholder="🔢 Enter Captcha Above">
        </div>
        
        <button class="login-btn" onclick="handleLogin()">Login to Dashboard 🚀</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
